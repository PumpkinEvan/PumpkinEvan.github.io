<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 核心：微信适配视口，保证在手机上显示正常 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>我们的婚礼邀请</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft Yahei", sans-serif;
            background: #fdf5f0;
            color: #333;
            overflow-x: hidden;
        }
        /* 封面样式 */
        .cover {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            animation: fadeIn 1.5s ease;
        }
        .cover h1 {
            font-size: 2.5rem;
            color: #e63946;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        .cover p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }
        .cover .open-btn {
            padding: 0.8rem 2rem;
            background: #e63946;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .cover .open-btn:hover {
            background: #d62828;
            transform: scale(1.05);
        }
        /* 请柬内容样式（初始隐藏） */
        .invitation {
            display: none;
            padding: 2rem 1rem;
            animation: slideUp 1s ease;
        }
        .invitation .title {
            text-align: center;
            font-size: 2rem;
            color: #e63946;
            margin-bottom: 2rem;
            position: relative;
        }
        .invitation .title::after {
            content: "";
            display: block;
            width: 80px;
            height: 3px;
            background: #e63946;
            margin: 0.5rem auto;
        }
        /* 信息卡片样式 */
        .info-card {
            background: white;
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .info-card h3 {
            color: #e63946;
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }
        .info-card p {
            line-height: 1.8;
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }
        /* 按钮样式 */
        .action-btn {
            display: inline-block;
            padding: 0.6rem 1.5rem;
            background: #fcb69f;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            margin-top: 0.5rem;
            transition: all 0.3s ease;
        }
        .action-btn:hover {
            background: #ff8fa3;
        }
        /* 动画定义 */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        /* 响应式适配 */
        @media (max-width: 480px) {
            .cover h1 { font-size: 2rem; }
            .invitation .title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <!-- 封面页 -->
    <div class="cover">
        <h1>我们结婚啦 💒</h1>
        <p>诚邀您见证我们的幸福</p>
        <button class="open-btn" id="openBtn">打开请柬</button>
    </div>

    <!-- 请柬内容 -->
    <div class="invitation" id="invitation">
        <div class="title">婚礼邀请函</div>

        <div class="info-card">
            <h3>致亲爱的你</h3>
            <p>当阳光洒满枝头，当微风拂过耳畔，我们决定携手奔赴未来。</p>
            <p>谨定于 <strong>2026年X月X日 中午12:00</strong>，在 <strong>XX酒店 XX宴会厅</strong> 举行婚礼仪式。</p>
            <p>诚邀您拨冗出席，与我们共享这份喜悦与美好。</p>
        </div>

        <div class="info-card">
            <h3>新人信息</h3>
            <p>新郎：XXX</p>
            <p>新娘：XXX</p>
            <p>联系电话：<a href="tel:13800138000" class="action-btn">点击拨打</a></p>
        </div>

        <div class="info-card">
            <h3>婚礼地址</h3>
            <p>地址：XX市XX区XX路XX号 XX酒店</p>
            <p><a href="https://map.qq.com/m/XXX" class="action-btn" target="_blank">点击导航</a></p>
        </div>

        <div class="info-card">
            <h3>温馨提示</h3>
            <p>1. 请提前告知是否出席，方便我们统计人数</p>
            <p>2. 建议着休闲正装，我们期待与您相聚</p>
        </div>
    </div>

    <!-- 背景音乐（微信自动播放兼容） -->
    <audio id="bgMusic" loop preload="auto">
        <source src="https://example.com/your-music.mp3" type="audio/mpeg">
    </audio>

    <script>
        // 获取DOM元素
        const openBtn = document.getElementById('openBtn');
        const invitation = document.getElementById('invitation');
        const bgMusic = document.getElementById('bgMusic');

        // 微信环境自动播放音乐的兼容处理
        function autoPlayMusic() {
            wx.config({
                debug: false,
                appId: '',
                timestamp: 1,
                nonceStr: '',
                signature: '',
                jsApiList: []
            });
            wx.ready(function() {
                bgMusic.play();
            });
            // 兜底方案：点击任意位置播放
            document.addEventListener('touchstart', function() {
                bgMusic.play();
            }, { once: true });
        }

        // 页面加载完成后初始化
        window.onload = function() {
            // 判断是否是微信环境
            const isWechat = /MicroMessenger/i.test(navigator.userAgent);
            if (isWechat) {
                autoPlayMusic();
            }

            // 点击打开请柬按钮
            openBtn.addEventListener('click', function() {
                // 隐藏封面，显示请柬内容
                document.querySelector('.cover').style.display = 'none';
                invitation.style.display = 'block';
                // 播放音乐
                bgMusic.play();
            });
        };
    </script>
</body>
</html>
