<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- 背景 -->
  <rect fill="#FFF9FB" width="800" height="500"/>
  
  <!-- 标题 -->
  <text x="400" y="40" text-anchor="middle" font-size="24" fill="#FF6B8A" font-weight="bold">公共交通路线汇合示意图</text>
  
  <!-- 定义箭头标记 -->
  <defs>
    <marker id="arrowPink" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#FF6B8A"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#E63950"/>
    </marker>
    <marker id="arrowCoral" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#FF8FA3"/>
    </marker>
  </defs>
  
  <!-- 三条起点路线（左侧） -->
  <!-- 路线卡片中心点计算：x=150 (50+200/2), y 分别为 120, 240, 360 -->
  <g transform="translate(50,80)">
    <!-- 路线 1：浦东机场（顶部卡片，中心 y=120） -->
    <rect x="0" y="0" width="200" height="80" rx="10" fill="#FFE5EC" stroke="#FFB7C5" stroke-width="2"/>
    <text x="100" y="30" text-anchor="middle" font-size="14" fill="#FF6B8A" font-weight="bold">📍 浦东机场</text>
    <text x="100" y="55" text-anchor="middle" font-size="12" fill="#9A7B8A">磁悬浮→地铁 2 号线</text>
    
    <!-- 路线 2：虹桥机场/高铁站（中间卡片，中心 y=240） -->
    <rect x="0" y="120" width="200" height="80" rx="10" fill="#FFF9FB" stroke="#FFD700" stroke-width="2"/>
    <text x="100" y="150" text-anchor="middle" font-size="14" fill="#E63950" font-weight="bold">📍 虹桥机场/高铁站</text>
    <text x="100" y="175" text-anchor="middle" font-size="12" fill="#9A7B8A">地铁 2 号线</text>
    
    <!-- 路线 3：上海站（底部卡片，中心 y=360） -->
    <rect x="0" y="240" width="200" height="80" rx="10" fill="#FFF5F0" stroke="#FF8FA3" stroke-width="2"/>
    <text x="100" y="270" text-anchor="middle" font-size="14" fill="#FF6B8A" font-weight="bold">📍 上海站</text>
    <text x="100" y="295" text-anchor="middle" font-size="12" fill="#9A7B8A">地铁 1 号线</text>
  </g>
  
  <!-- 汇合点：堡镇汽车站（中心点：x=500, y=240） -->
  <circle cx="500" cy="240" r="60" fill="#FFD700" opacity="0.3"/>
  <circle cx="500" cy="240" r="40" fill="#FFD700" opacity="0.5"/>
  <text x="500" y="235" text-anchor="middle" font-size="16" fill="#FF6B8A" font-weight="bold">🚌</text>
  <text x="500" y="260" text-anchor="middle" font-size="14" fill="#E63950" font-weight="bold">堡镇汽车站</text>
  <text x="500" y="280" text-anchor="middle" font-size="12" fill="#9A7B8A">三条路线汇合点</text>
  
  <!-- 修正后的箭头路径 - 全部精确指向汇合点边缘 -->
  <!-- 路线 1：从 (250,120) 到汇合点左上边缘 (445,205)，使用贝塞尔曲线 -->
  <path d="M250 120 C350 120 400 180 445 205" fill="none" stroke="#FF6B8A" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowPink)"/>
  
  <!-- 路线 2：从 (250,240) 到汇合点左边缘 (440,240)，水平直线 -->
  <path d="M250 240 L440 240" fill="none" stroke="#E63950" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowRed)"/>
  
  <!-- 路线 3：从 (250,360) 到汇合点左下边缘 (445,275)，使用贝塞尔曲线 -->
  <path d="M250 360 C350 360 400 300 445 275" fill="none" stroke="#FF8FA3" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowCoral)"/>
  
  <!-- 共同路线：南堡专线 -->
  <rect x="580" y="200" width="180" height="80" rx="10" fill="#FFF9FB" stroke="#FF6B8A" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="670" y="230" text-anchor="middle" font-size="14" fill="#FF6B8A" font-weight="bold">南堡专线</text>
  <text x="670" y="255" text-anchor="middle" font-size="12" fill="#9A7B8A">→ 化肥厂站</text>
  
  <!-- 连接箭头：汇合点 → 共同路线 -->
  <path d="M560 240 L580 240" fill="none" stroke="#FF6B8A" stroke-width="2" marker-end="url(#arrowPink)"/>
  
  <!-- 终点：汉庭酒店 -->
  <circle cx="670" cy="360" r="50" fill="#FF6B8A" opacity="0.2"/>
  <text x="670" y="355" text-anchor="middle" font-size="20" fill="#FF6B8A">🚩</text>
  <text x="670" y="380" text-anchor="middle" font-size="14" fill="#E63950" font-weight="bold">汉庭酒店</text>
  
  <!-- 连接箭头：共同路线 → 终点 -->
  <path d="M670 280 L670 310" fill="none" stroke="#FF6B8A" stroke-width="2" marker-end="url(#arrowPink)"/>
</svg>
